<!DOCTYPE html>
<html lang = "en">

<head>

  <meta charset = "UTF-8">
  <meta name = "viewport" 
  content = "width=device-width, initial-scale = 1.0">
  <title>Pokédex</title>
  <link rel = "stylesheet" href = "style.css">

  </head>
  <body>
    <nav class = "navbar">
        <div class = "logo">
            ⚡Pokédex

        </div>

        <ul class="nav-links">
            <li>🔍Search</li>
            <li>Types</li>
            <li>❤️Favorites</li>
            <li>🌙</li>
        </ul>
    
    </nav>

    <section class="hero">
            <h1>Discover the Pokémon Universe</h1>

            <p>

                Explore over 1000 Pokemon from every Generation 
        
            </p>

            <div class="search-container">
                <input 
                    type = "text"
                    placeholder = "Search Pokémon..."
                    class="search-box"
                >

                <button class="search-btn">

                    🔍 Search

                </button>

            </div>

        
    </section>

    <section class="types">

        <h2>Filter by Type</h2>

        <div class="type-container">

            <button class="type normal">🤓 Normal</button>

            <button class="type fire">🔥 Fire</button>

            <button class="type water">💧 Water</button>

            <button class="type electric">⚡ Electric</button>

            <button class="type grass">🌿 Grass</button>

            <button class="type ice">❄️ Ice</button>

            <button class="type fighting">💪 Fighting</button>

            <button class="type poison">☠️ Poison</button>

            <button class="type ground">🌍 Ground</button>

            <button class="type flying">🕊️ Flying</button>

            <button class="type psychic">🔮 Psychic</button>

            <button class="type bug">🐛 Bug</button>

            <button class="type rock">⛰️ Rock</button>

            <button class="type ghost">👻 Ghost</button>

            <button class="type dragon">🐉 Dragon</button>

            <button class="type dark">🌑 Dark</button>

            <button class="type steel">🔩 Steel</button>

            <button class="type fairy">🧚 Fairy</button>
        </div>
    </section>

    <div class="loader-container">

        <div class="pokeball-loader"></div>

        <p>Loading Pokémon...</p>

    </div>

    <section class="pokémon-section">

        <h2>Popular Pokémon</h2>

        <div class="pokemon-grid">

           

            

            


        </div>


    </section>

    <section class="pokémon-modal">

        <div class="modal-content">

        </div>

    </section>
    <div class="pokemon-modal">

        <div class="modal-content">

            <span class="close-btn">&times;</span>

            <div class="modal-body">

            </div>

        </div>

    </div>

  </body>
  <script src = "script.js"></script>
  </html>

<!DOCTYPE html>
<html lang = "en">

<head>

  <meta charset = "UTF-8">
  <meta name = "viewport" 
  content = "width=device-width, initial-scale = 1.0">
  <title>Pokédex</title>
  <link rel = "stylesheet" href = "style.css">

  </head>
  <body>
    <nav class = "navbar">
        <div class = "logo">
            ⚡Pokédex

        </div>

        <ul class="nav-links">
            <li>🔍Search</li>
            <li>Types</li>
            <li>❤️Favorites</li>
            <li>🌙</li>
        </ul>
    
    </nav>

    <section class="hero">
            <h1>Discover the Pokemon Universe</h1>

            <p>

                Explore over 1000 Pokemon from every Generation 
        
            </p>

            <div class="search-container">
                <input 
                    type = "text"
                    placeholder = "Search Pokemon..."
                    class="search-box"
                >

                <button class="search-btn">

                    🔍 Search

                </button>

            </div>

        
    </section>

    <section class="types">

        <h2>Filter by Type</h2>

        <div class="type-container">

            <button class="type normal" data-type="normal">🤓 Normal</button>

            <button class="type fire" data-type="fire">🔥 Fire</button>

            <button class="type water" data-type="water">💧 Water</button>

            <button class="type electric" data-type="electric">⚡ Electric</button>

            <button class="type grass" data-type="grass">🌿 Grass</button>

            <button class="type ice " data-type="ice">❄️ Ice</button>

            <button class="type fighting" data-type="fighting">💪 Fighting</button>

            <button class="type poison" data-type="poison">☠️ Poison</button>

            <button class="type ground" data-type="ground">🌍 Ground</button>

            <button class="type flying" data-type="flying">🕊️ Flying</button>

            <button class="type psychic" data-type="psychic">🔮 Psychic</button>

            <button class="type bug" data-type="bug">🐛 Bug</button>

            <button class="type rock" data-type="rock">⛰️ Rock</button>

            <button class="type ghost" data-type="ghost">👻 Ghost</button>

            <button class="type dragon" data-type="dragon">🐉 Dragon</button>

            <button class="type dark" data-type="dark">🌑 Dark</button>

            <button class="type steel" data-type="steel">🔩 Steel</button>

            <button class="type fairy" data-type="fairy">🧚 Fairy</button>
        </div>
    </section>

    <div class="loader-container">

        <div class="pokeball-loader"></div>

        <p>Loading Pokemon...</p>

    </div>

    <section class="pokemon-section">

        <h2>Popular Pokemon</h2>

        <div class="pokemon-grid">

           

            

            


        </div>


    </section>

    
    <div class="pokemon-modal">

        <div class="modal-content">

            <span class="close-btn">&times;</span>

            <div class="modal-body">

            </div>

        </div>

    </div>

  </body>
  <script src = "script.js"></script>
  </html>
